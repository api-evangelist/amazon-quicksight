naftiko: 1.0.0-alpha2
info:
  label: Amazon Quicksight Operations
  description: Workflow capability for Amazon Quicksight. Enables automation of Amazon Quicksight resources for cloud operations
    teams.
  tags:
  - Amazon Quicksight
  - AWS
  - Cloud Operations
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY: AWS_ACCESS_KEY
    AWS_SECRET_KEY: AWS_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-quicksight
    baseUri: https://quicksight.{region}.amazonaws.com
    description: Amazon QuickSight API
    authentication:
      type: bearer
      token: '{{AWS_ACCESS_KEY}}'
    resources:
    - name: accounts
      path: /accounts/{AwsAccountId}/dashboards
      description: accounts operations
      operations:
      - name: ListDashboards
        method: GET
        description: Amazon QuickSight List dashboards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: DescribeDashboard
        method: GET
        description: Amazon QuickSight Describe a dashboard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: ListDataSets
        method: GET
        description: Amazon QuickSight List datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-quicksight-api
    description: Unified REST API for Amazon Quicksight operations.
    resources:
    - path: /v1/resources
      name: resources
      description: Amazon Quicksight resources
      operations:
      - method: GET
        name: list-resources
        description: List Amazon Quicksight resources
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-quicksight-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Quicksight operations.
    tools:
    - name: list-amazon-quicksight-resources
      description: List Amazon Quicksight resources
      hints:
        readOnly: true
      outputParameters:
      - type: object
        mapping: $.
