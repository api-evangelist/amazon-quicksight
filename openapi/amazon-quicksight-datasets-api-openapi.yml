openapi: 3.1.0
info:
  title: Amazon QuickSight Dashboards Datasets API
  description: The Amazon QuickSight API enables programmatic management of QuickSight resources including dashboards, datasets, data sources, analyses, templates, users, and groups. You can also embed analytics into your applications.
  version: '2018-04-01'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
servers:
- url: https://quicksight.{region}.amazonaws.com
  description: Amazon QuickSight regional endpoint
  variables:
    region:
      default: us-east-1
      description: AWS region
      enum:
      - us-east-1
      - us-east-2
      - us-west-2
      - eu-west-1
      - eu-west-2
      - eu-central-1
      - ap-northeast-1
      - ap-northeast-2
      - ap-southeast-1
      - ap-southeast-2
security:
- sigv4: []
tags:
- name: Datasets
  description: Operations for managing datasets
paths:
  /accounts/{AwsAccountId}/data-sets:
    get:
      operationId: ListDataSets
      summary: Amazon QuickSight List datasets
      description: Lists all datasets in the current AWS account.
      tags:
      - Datasets
      parameters:
      - name: AwsAccountId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Datasets listed successfully
components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4
